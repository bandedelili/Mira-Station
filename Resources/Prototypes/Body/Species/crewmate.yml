- type: entity
  parent: BaseSpeciesAppearance
  id: AppearanceCrewmate
  categories: [ HideSpawnMenu ]
  name: crewmate appearance
  components:
  - type: HumanoidProfile
    species: DefaultCrew
  - type: Sprite
    sprite: /Mobs/Species/Default/crewmate.rsi/
    layers:
      - state: crewmatebody
        map: [ "enum.DamageStateVisualLayers.Base" ]
      - state: crewmatevisor
        map: [ "enum.DamageStateVisualLayers.BaseUnshaded" ]
  - type: Inventory
    speciesId: defaultcrew
    displacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Mobs/Species/Vulpkanin/displacement.rsi
            state: jumpsuit
      back:
        sizeMaps:
          32:
            sprite: Mobs/Species/Vulpkanin/displacement.rsi
            state: back
      outerClothing:
        sizeMaps:
          32:
            sprite: Mobs/Species/Vulpkanin/displacement.rsi
            state: outerwear
      gloves:
        sizeMaps:
          32:
            sprite: Mobs/Species/Vulpkanin/displacement.rsi
            state: hand
      shoes:
        sizeMaps:
          32:
            sprite: Mobs/Species/Vulpkanin/displacement.rsi
            state: shoes
      head:
        sizeMaps:
          32:
            sprite: Mobs/Species/Vulpkanin/displacement.rsi
            state: head
      neck:
        sizeMaps:
          32:
            sprite: Mobs/Species/Vulpkanin/displacement.rsi
            state: neck
      eyes:
        sizeMaps:
          32:
            sprite: Mobs/Species/Vulpkanin/displacement.rsi
            state: eyes
      belt:
        sizeMaps:
          32:
            sprite: Mobs/Species/Vulpkanin/displacement.rsi
            state: belt

- type: entity
  parent:
  - BaseSpeciesMobOrganic
  id: MobBasicCrew
  name: Nullmate
  components:
  - type: DamageVisuals
    damageOverlayGroups:
      Brute:
        sprite: Mobs/Effects/brute_damage.rsi
        color: "#ccac1f"
      Burn:
        sprite: Mobs/Effects/burn_damage.rsi
  - type: Speech
    speechSounds: Vulpkanin
    speechVerb: Vulpkanin
    allowedEmotes: [ 'Hew', 'Chitter', 'Whine', 'Click', 'Chime' ]
  - type: TypingIndicator
    proto: default
  - type: Vocal
    emoteSounds: MaleVulpkanin
  - type: Damageable
    damageModifierSet: Vulpkanin
  - type: MeleeWeapon
    soundHit:
      path: /Audio/Weapons/pierce.ogg
    animation: WeaponArcClaw
    damage:
      types:
        Piercing: 2
        Slash: 3
  - type: Temperature
    specificHeat: 44
  - type: TemperatureDamage
    heatDamageThreshold: 320
    coldDamageThreshold: 230
    coldDamage:
      types:
        Cold: 0.05 # Per second, scales with temperature & other constants
    heatDamage:
      types:
        Heat: 2.5 # Per second, scales with temperature & other constants
  - type: Wagging
    action: ActionToggleWaggingVulpkanin
  - type: TemperatureProtection
    heatingCoefficient: 1.2
    coolingCoefficient: 0.3
  - type: JumpAbility
    action: ActionVulpkaninGravityJump
    canCollide: true
    jumpDistance: 3
    jumpSound:
      path: /Audio/Weapons/punchmiss.ogg
      params:
        pitch: 1.33
        volume: -5
        variation: 0.05
  - type: Bloodstream
    bloodReferenceSolution:
      reagents:
      - ReagentId: SulfurBlood
        Quantity: 600
  - type: CreamPied
    sprite:
      sprite: Effects/creampie.rsi
      state: creampie_vulpkanin

- type: entity
  parent: OrganBaseOrganic
  id: OrganCrewmate
  abstract: true
  suffix: Crewmate

- type: entity
  id: OrganCrewmateMetabolizer
  abstract: true
  components:
  - type: Metabolizer
    metabolizerTypes: [ Animal ]

- type: entity
  parent: OrganVulpkanin
  id: OrganVulpkaninInternal
  abstract: true
  components:
  - type: Sprite
    sprite: Mobs/Species/Vulpkanin/organs.rsi

- type: entity
  id: OrganVulpkaninVisual
  abstract: true
  components:
  - type: VisualOrgan
    data:
      sprite: Mobs/Species/Vulpkanin/parts.rsi
  - type: VisualOrganMarkings
    markingData:
      group: Vulpkanin


- type: entity
  parent: [ OrganBaseHead, OrganVulpkaninExternal ]
  id: OrganVulpkaninHead
  components:
  - type: VisualOrganMarkings
    hideableLayers:
    - enum.HumanoidVisualLayers.Snout
    - enum.HumanoidVisualLayers.HeadTop
    - enum.HumanoidVisualLayers.HeadSide
    - enum.HumanoidVisualLayers.Hair
    - enum.HumanoidVisualLayers.FacialHair
    dependentHidingLayers:
      enum.HumanoidVisualLayers.Snout:
      - enum.HumanoidVisualLayers.SnoutCover
    markingsDisplacement:
      Hair:
        sizeMaps:
          32:
            sprite: Mobs/Species/Vulpkanin/displacement.rsi
            state: hair

